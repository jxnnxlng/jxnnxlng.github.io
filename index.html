<!DOCTYPE html>
<html>
  <head>
    <title>Jannes Blog</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        font-size: 20px;
      }
      h1 {
        display: inline;
        position: relative;
        font-size: 3em;
        padding-bottom: 300px;
      }
      h1::after {
        content: "";
        display: block;
        position: absolute;
        top: 25px;
        left: 0;
        right: 0;
        height: 0.5em;
        background-color: yellow;
        z-index: -1;
      }
      h2 {
        font-size: 2em;
        display:inline;
        position:relative;
      }
      h2::after {
        content:"";
        display:block;
        position:absolute;
        top: calc(25px / 2 + 5px);
        left:0; /* Abstand von 0px vom linken Rand des umgebenden Elements */
        right:0; /* Abstand von 0px vom rechten Rand des umgebenden Elements */
        height:.5em; /* Höhe des Pseudoelements als 0.5-fache der Schriftgröße des Elternelements */
        background-color:yellow; /* Hintergrundfarbe des Pseudoelements */
        z-index:-1; /* Stapelreihenfolge des Pseudoelements hinter dem Elternelement */
      }
      a { /* Stilregeln für a-Elemente (Hyperlinks) */
        text-decoration:none; /* Keine Textdekoration (z.B. Unterstreichung) für Hyperlinks */
        color:black; /* Textfarbe für Hyperlinks */
      }
      article p { /* Stilregeln für p-Elemente innerhalb von article-Elementen*/
        margin-top:0; /* Kein Abstand oberhalb von p-Elementen innerhalb von article-Elementen*/
      }
      article { /* Stilregeln für article-Elemente*/
        margin-bottom:50px; /* Abstand von 50px unterhalb von article-Elementen*/
      }
    </style>
  </head>
  <body>
    <h1>Jannes Blog</h1>
    <br><br><br>
    <article>
      <h2><a href="post1.html">Mein erster Blogbeitrag</a></h2>
      <p>Dies ist mein erster Blogbeitrag. Hier schreibe ich über meine Erfahrungen und Gedanken.</p>
    </article>
    <article>
      <h2><a href="post2.html">Ein weiterer interessanter Beitrag</a></h2>
      <p>In diesem Beitrag teile ich einige interessante Fakten und Gedanken
    </article>
  </body>
</html>
