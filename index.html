<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Jannes Blog</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        font-size: 20px;
      }
      h1 {
        display: inline;
        position: relative;
        font-size: 3em;
        padding-bottom: 300px;
      }
      h1::after {
        content: "";
        display: block;
        position: absolute;
        top: 25px;
        left: 0;
        right: 0;
        height: 0.5em;
        background-color: yellow;
        z-index: -1;
      }
      h2 {
        font-size: 2em;
        display:inline;
        position:relative;
      }
      h2::after {
        content:"";
        display:block;
        position:absolute;
        top: calc(25px / 2 + 5px);
        left:0;
        right:0;
        height:.5em;
        background-color:yellow;
        z-index:-1;
      }
      a {
        text-decoration:none;
        color:black;
      }
      article p {
        margin-top:0;
      }
      article {
        margin-bottom:50px;
      }
    </style>
  </head>
  <body>
    <h1>Jannes Blog</h1>
    <br><br><br>
    <article>

    </article>

    </article>
  </body>
</html>
